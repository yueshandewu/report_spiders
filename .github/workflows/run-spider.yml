name: run-report-spider

on:
  workflow_dispatch:
  schedule:
    - cron: "10 2 * * *"  # 每天 02:10 UTC（北京时间=+8，即10:10）

jobs:
  spider:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 若没有 requirements.txt，先确保 scrapy 可用
          pip show scrapy >/dev/null 2>&1 || pip install scrapy

      - name: Run spider
        run: |
          # 按你的项目实际入口修改这一行
          python run.py

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: |
            output/**
            data/**
            results/**
            *.json
            *.csv
            *.xlsx
            logs/**
